<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Teszt Űrlap</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">
    
    <h2>FormSubmit Teszt</h2>
    <p>Ha ez az űrlap működik (visszairányít a sikeres oldalra), akkor a probléma a főoldal kódjában van.</p>

    <form action="https://formsubmit.co/gzolcsi2010@gmail.com" method="POST">
        <!-- Rejtett beállítások -->
        <input type="hidden" name="_subject" value="TESZT LEVELES GITHUBROL">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="?success=true">
        <input type="hidden" name="_template" value="table">

        <div style="margin-bottom: 10px;">
            <label>Név: </label><br>
            <input type="text" name="name" required style="padding: 5px;">
        </div>

        <div style="margin-bottom: 10px;">
            <label>Email: </label><br>
            <input type="email" name="email" required style="padding: 5px;">
        </div>

        <button type="submit" style="padding: 10px 20px; background: green; color: white; border: none; cursor: pointer;">
            Küldés Teszt
        </button>
    </form>

    <!-- Ez a script ellenőrzi a sikerességet -->
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('success')) {
                document.body.innerHTML = "<h1 style='color:green'>SIKERES TESZT! Az adatok elindultak.</h1><p>Ellenőrizd a Gmail fiókodat.</p>";
            }
        };
    </script>

</body>
</html>
